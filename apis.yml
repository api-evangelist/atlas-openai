  - type: Features
    data:
      - Chromium-based AI browser developed by OpenAI
      - Released October 21, 2025 (macOS first; Windows, iOS, Android coming)
      - ChatGPT sidebar assistant for page summary, comparison, and analysis
      - Cursor chat for inline text rewriting on any page
      - Browser memory for contextual recall across sessions
      - Agent Mode (Plus/Pro paid tiers) for autonomous task execution
      - Tab organization with vertical tabs (added Nov 2025)
      - Freemium model tied to existing ChatGPT subscriptions
    sources:
      - https://openai.com/index/chatgpt-atlas/
      - https://en.wikipedia.org/wiki/ChatGPT_Atlas
    updated: '2026-05-23'
  - type: Notes
    data:
      - No public REST/GraphQL API is documented for the Atlas browser itself.
      - OpenAI's developer API platform (api.openai.com) is a separate product line covered elsewhere.
